services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # Guarda el modelo descargado dentro de ./backend/models (en el proyecto).
      - HF_HOME=/app/models
    volumes:
      - ./backend/models:/app/models

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
