<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MORPHO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
  <div id="app" class="h-dvh flex flex-col bg-zinc-950 text-zinc-100 antialiased">

    <!-- ===== pantalla de carga del modelo ===== -->
    <div v-if="!appReady" class="flex-1 flex flex-col items-center justify-center gap-5 px-6 text-center">
      <div>
        <p class="text-zinc-200 font-medium">Preparando el modelo</p>
        <p class="text-zinc-500 text-sm mt-1">{{ loadStage }}</p>
      </div>
      <!-- barra de progreso -->
      <div class="w-full max-w-sm">
        <div class="flex justify-between text-xs text-zinc-500 mb-1.5 tabular-nums">
          <span>{{ loadProgress }}%</span>
          <span>{{ loadElapsed }}s</span>
        </div>
        <div class="h-2 w-full rounded-full bg-zinc-800 overflow-hidden">
          <div class="h-full bg-amber-400 rounded-full transition-all duration-500 ease-out"
               :style="{ width: loadProgress + '%' }"></div>
        </div>
      </div>
      <p class="text-zinc-600 text-xs">la primera vez puede tardar 1–2 min</p>
    </div>

    <!-- ===== app (cuando el modelo esta listo) ===== -->
    <template v-else>
      <header class="shrink-0 flex items-center justify-between px-5 py-3 border-b border-zinc-800/70">
        <div class="flex items-center gap-2.5">
          <span class="w-2.5 h-2.5 rounded-full" :class="dotClass"></span>
          <span class="text-base font-bold tracking-[0.3em] uppercase text-zinc-100">
            MORPHO<span class="text-amber-400">.</span>
          </span>
        </div>
        <span class="text-xs text-zinc-500">{{ status }}</span>
      </header>

      <main class="flex-1 min-h-0 flex items-center justify-center p-4 md:p-6">
        <div class="relative h-full w-full flex items-center justify-center">
          <img v-if="img" :src="img" alt=""
               class="max-h-full max-w-full object-contain rounded-2xl ring-1 ring-zinc-800 shadow-2xl shadow-black/50 transition-all duration-300"
               :class="generating ? 'blur-lg scale-105 brightness-75' : ''" />

          <div v-else class="flex flex-col items-center justify-center gap-3 text-zinc-700 select-none">
            <svg class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.25">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M18 8.25h.008v.008H18V8.25zm2.25 10.5H3.75A1.5 1.5 0 012.25 17.25V6.75A1.5 1.5 0 013.75 5.25h16.5A1.5 1.5 0 0121.75 6.75v10.5a1.5 1.5 0 01-1.5 1.5z" />
            </svg>
            <span class="text-sm">escribí abajo para generar</span>
          </div>

          <div v-if="generating"
               class="absolute bottom-3 right-3 flex items-center gap-2.5 px-3.5 py-2 rounded-full
                      bg-zinc-900/80 backdrop-blur border border-zinc-700 text-sm text-zinc-200">
            <span class="w-4 h-4 rounded-full border-2 border-zinc-600 border-t-amber-400 animate-spin"></span>
            generando
          </div>
        </div>
      </main>

      <footer class="shrink-0 border-t border-zinc-800/70 px-4 py-3.5">
        <div class="max-w-2xl mx-auto">
          <div class="relative">
            <textarea v-model="prompt" @input="onInput" @keydown.enter.prevent="regenerate"
                      rows="1" placeholder="describí tu imagen..."
                      class="w-full resize-none pl-4 pr-24 py-3 rounded-xl bg-zinc-900 border border-zinc-800
                             text-[15px] leading-snug text-zinc-100 placeholder-zinc-600 outline-none transition
                             focus:border-amber-500/70 focus:ring-2 focus:ring-amber-500/20"></textarea>
            <kbd class="absolute right-3 top-1/2 -translate-y-1/2 text-[11px] font-medium
                        px-2 py-1 rounded-md bg-zinc-800 text-zinc-300 border border-zinc-700">↵ nueva</kbd>
          </div>
          <p class="mt-2 text-center text-[12px] text-zinc-600">
            se genera solo mientras escribís · <span class="text-zinc-500">Enter</span> = otra imagen
          </p>
        </div>
      </footer>
    </template>
  </div>

  <script>
    const { createApp, ref, computed, onMounted } = Vue
    createApp({
      setup() {
        const appReady = ref(false)
        const loadStage = ref('iniciando...')
        const loadElapsed = ref(0)
        const loadProgress = ref(0)

        const prompt = ref('')
        const img = ref('')
        const status = ref('conectando...')
        const generating = ref(false)
        let ws, timer, reconnectTimer

        const host = location.hostname || 'localhost'

        const dotClass = computed(() => {
          if (generating.value) return 'bg-amber-400 animate-pulse'
          if (status.value === 'listo') return 'bg-emerald-400'
          if (status.value === 'reconectando...') return 'bg-amber-400 animate-pulse'
          return 'bg-rose-500'
        })

        // Espera a que el backend termine de cargar el modelo, mostrando progreso.
        async function waitForBackend() {
          try {
            const r = await fetch('http://' + host + ':8000/status')
            const d = await r.json()
            loadStage.value = d.stage || 'cargando...'
            loadElapsed.value = d.elapsed || 0
            loadProgress.value = d.progress || 0
            if (d.ready) { appReady.value = true; connect(); return }
          } catch (e) {
            loadStage.value = 'esperando al backend...'
          }
          setTimeout(waitForBackend, 1000)
        }

        function connect() {
          ws = new WebSocket('ws://' + host + ':8000/ws')
          ws.onopen = () => status.value = 'listo'
          ws.onmessage = e => {
            if (!prompt.value.trim()) { generating.value = false; return }  // llego tarde tras borrar
            img.value = 'data:image/jpeg;base64,' + e.data
            generating.value = false
            status.value = 'listo'
          }
          ws.onerror = () => ws.close()
          ws.onclose = () => {
            generating.value = false
            status.value = 'reconectando...'
            // Vuelve a la pantalla de carga y re-chequea /status hasta que el
            // backend este listo otra vez (ej. si reinicio y recarga el modelo).
            appReady.value = false
            clearTimeout(reconnectTimer)
            reconnectTimer = setTimeout(waitForBackend, 1000)
          }
        }

        function send() {
          if (ws && ws.readyState === 1 && prompt.value.trim()) {
            ws.send(prompt.value)
            generating.value = true
            status.value = 'generando...'
          }
        }

        function onInput() {
          clearTimeout(timer)
          if (!prompt.value.trim()) {       // borra todo -> limpia imagen
            img.value = ''
            generating.value = false
            status.value = 'listo'
            return
          }
          timer = setTimeout(send, 150)     // debounce
        }

        function regenerate() {             // Enter -> imagen nueva
          clearTimeout(timer)
          send()
        }

        onMounted(waitForBackend)

        return { appReady, loadStage, loadElapsed, loadProgress,
                 prompt, img, status, generating, dotClass, onInput, regenerate }
      }
    }).mount('#app')
  </script>
</body>
</html>
